services:
  - type: web
    name: markowitz-dashboard
    runtime: python
    runtimeVersion: "3.12.0"
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic --noinput
    startCommand: gunicorn app.wsgi:application --bind 0.0.0.0:
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: app.settings
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
