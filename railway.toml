[build]
rootDirectory = "backend"
watchPatterns = ["backend/**/*.py", "backend/**/*.html", "frontend/**/*.js", "frontend/**/*.css"]

[deploy]
startCommand = "gunicorn app.wsgi:application --bind 0.0.0.0: --timeout 120"
healthcheckPath = "/"

[deploy.preDeploy]
command = "python manage.py migrate --noinput && python manage.py collectstatic --noinput"

[templates]
python = "3.12"
